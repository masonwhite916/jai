kind = "mobile"
previewPath = "/"
title = "JAI Driver — Technician App"
version = "1.0.0"
id = "artifacts/jai-driver"
router = "path"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 19297

[services.development]
run = "pnpm --filter @workspace/jai-driver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jai-driver", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/jai-driver", "run", "serve" ]

[services.env]
PORT = "19297"
BASE_PATH = "/"
APP_VARIANT = "technician"
